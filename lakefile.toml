name = "lean4-yaml-verified"
defaultTargets = ["Lean4Yaml"]

[leanOptions]
"autoImplicit" = false

[[require]]
name = "Parser"
git = "https://github.com/NicolasRouquette/lean4-parser"
rev = "std-iterators"

[[lean_lib]]
name = "Lean4Yaml"

[[lean_lib]]
name = "Tests.VerifiedResult"

[[lean_lib]]
name = "Tests.SuiteRunner.Meta"

[[lean_lib]]
name = "Tests.SuiteRunner.HtmlReport"

[[lean_lib]]
name = "Tests.Main"

[[lean_lib]]
name = "Tests.ParseTest"

[[lean_lib]]
name = "Tests.QuotedFolding"

[[lean_lib]]
name = "Tests.Verification"

[[lean_lib]]
name = "Tests.StringLemmas"

[[lean_lib]]
name = "Tests.AnchorAlias"

[[lean_lib]]
name = "Tests.TagTests"

[[lean_lib]]
name = "Demo"

[[lean_exe]]
name = "tests"
root = "Tests.Main.Runner"

[[lean_exe]]
name = "demo"
