name = "lean4-yaml-verified"
defaultTargets = ["Lean4Yaml"]

[leanOptions]
"autoImplicit" = false

[[require]]
name = "Parser"
git = "https://github.com/fgdorais/lean4-parser"
rev = "main"

[[lean_lib]]
name = "Lean4Yaml"

[[lean_exe]]
name = "tests"
root = "Tests.Main"

[[lean_exe]]
name = "demo"
root = "Demo"
