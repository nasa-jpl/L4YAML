name = "lean4-yaml-verified"
defaultTargets = ["Lean4Yaml"]

[leanOptions]
"autoImplicit" = false

[[require]]
name = "Parser"
git = "https://github.com/NicolasRouquette/lean4-parser"
rev = "total-fold"

[[lean_lib]]
name = "Lean4Yaml"

[[lean_lib]]
name = "Tests.VerifiedResult"

[[lean_lib]]
name = "Tests.SuiteRunner.Meta"

[[lean_lib]]
name = "Tests.SuiteRunner.HtmlReport"

[[lean_lib]]
name = "Tests.Main"

[[lean_lib]]
name = "Tests.ParseTest"

[[lean_lib]]
name = "Tests.QuotedFolding"

[[lean_lib]]
name = "Tests.Verification"

[[lean_lib]]
name = "Tests.StringLemmas"

[[lean_lib]]
name = "Tests.AnchorAlias"

[[lean_lib]]
name = "Tests.TagTests"

[[lean_lib]]
name = "Demo"

[[lean_exe]]
name = "tests"
root = "Tests.Main.Runner"

[[lean_exe]]
name = "demo"
root = "Demo.Runner"

[[lean_exe]]
name = "parsetest"
root = "Tests.ParseTest.Runner"

[[lean_exe]]
name = "suiterunner"
root = "Tests.SuiteRunner.Main"

[[lean_exe]]
name = "tryparse"
root = "Tests.TryParse"

[[lean_exe]]
name = "tryroundtrip"
root = "Tests.TryRoundTrip"

[[lean_exe]]
name = "quotedfolding"
root = "Tests.QuotedFolding.Runner"

[[lean_exe]]
name = "verification"
root = "Tests.Verification.Runner"

[[lean_exe]]
name = "stringlemmas"
root = "Tests.StringLemmas.Runner"

[[lean_exe]]
name = "anchortests"
root = "Tests.AnchorAlias.Runner"

[[lean_exe]]
name = "tagtests"
root = "Tests.TagTests.Runner"

[[lean_lib]]
name = "Tests.ExplicitKeyTests"

[[lean_exe]]
name = "explicitkeytests"
root = "Tests.ExplicitKeyTests.Runner"

[[lean_lib]]
name = "Tests.FlowTests"

[[lean_exe]]
name = "flowtests"
root = "Tests.FlowTests.Runner"

[[lean_lib]]
name = "Tests.CharClassTests"

[[lean_exe]]
name = "charclass"
root = "Tests.CharClassTests.Runner"

[[lean_lib]]
name = "Tests.ValidationTests"

[[lean_exe]]
name = "validationtests"
root = "Tests.ValidationTests.Runner"

[[lean_exe]]
name = "flowregressioncheck"
root = "Tests.FlowRegressionCheck"

[[lean_exe]]
name = "errorstagediag"
root = "Tests.ErrorStageDiag"

[[lean_exe]]
name = "scalarstagediag"
root = "Tests.ScalarStageDiag"

[[lean_lib]]
name = "Tests.CompletenessTests"

[[lean_exe]]
name = "completenesstests"
root = "Tests.CompletenessTests.Runner"
