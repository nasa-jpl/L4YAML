name = "L4YAML"
# Keep this in sync with rust/l4yaml{,-sys}/Cargo.toml,
# python/pyproject.toml, and python/l4yaml/__init__.py.
# See "Versioning" in README.md.
version = "0.4.6"
defaultTargets = [
  "L4YAML",
  "Tests.Guards",
  "tryparse",
  "tryscan",
  "tryroundtrip",
  "trydump",
  "explicitkeytests",
  "flowtests",
  "validationtests",
  "flowregressioncheck",
  "errorstagediag",
  "scalarstagediag",
  "dumproundtrip",
  "rawparsetests",
  "specexamples",
  "schemadump",
  "scannertests",
  "scannerspecexamples",
  "suiterunner",
  "queryresults",
  "adversarialtests",
  "mutationtests",
  "propertytests",
  "productioncoverage",
  "adversarialinstantiation",
]

[leanOptions]
"autoImplicit" = false

# see https://crates.io/crates/lean-tui
[[require]]
name = "LeanPrism"
git = "https://codeberg.org/wvhulle/lean-prism.git"
rev = "main"

[[require]]
name = "importGraph"
git = "https://github.com/leanprover-community/import-graph"
rev = "v4.29.0"

[[require]]
name = "DocGen4"
git = "https://github.com/NicolasRouquette/doc-gen4"
rev = "fix/generalize-git-forge-urls"

[[lean_lib]]
name = "L4YAML"

[[lean_lib]]
name = "Tests.Guards"

[[lean_lib]]
name = "Tests.VerifiedResult"

[[lean_lib]]
name = "Tests.SuiteRunner.Meta"

[[lean_lib]]
name = "Tests.SuiteRunner.HtmlReport"

[[lean_lib]]
name = "Tests.Main"

[[lean_lib]]
name = "Demo"

[[lean_exe]]
name = "tests"
root = "Tests.Main.Runner"

[[lean_exe]]
name = "demo"
root = "Demo.Runner"

[[lean_exe]]
name = "suiterunner"
root = "Tests.SuiteRunner.Main"

