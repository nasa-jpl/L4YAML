name: Generate Test Coverage Report

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test-coverage:
    runs-on: self-hosted

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Elan (Lean toolchain manager)
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Install Lean toolchain
        run: |
          if [ -f lean-toolchain ]; then
            TOOLCHAIN="$(cat lean-toolchain)"
            echo "Lean toolchain: $TOOLCHAIN"
            elan toolchain install "$TOOLCHAIN" || true
          fi
          elan show

      - name: Create docs directory
        run: mkdir -p docs

      - name: Build parser and test tools
        run: |
          lake build Lean4Yaml
          lake build suiterunner tryparse tryroundtrip trydump
          lake build tests demo explicitkeytests flowtests
          lake build validationtests dumproundtrip rawparsetests
          lake build specexamples schemadump scannertests scannerspecexamples
          lake build adversarialtests mutationtests
          lake build flowregressioncheck errorstagediag scalarstagediag

      - name: Run unit and integration tests
        run: |
          echo "=== Unit Tests ===" | tee docs/unit-tests.txt
          ./.lake/build/bin/tests 2>&1 | tee -a docs/unit-tests.txt
          echo ""
          echo "=== Demo ===" | tee docs/demo.txt
          ./.lake/build/bin/demo 2>&1 | tee -a docs/demo.txt
          echo ""
          echo "=== Explicit Key Tests ===" | tee docs/explicitkeytests.txt
          ./.lake/build/bin/explicitkeytests 2>&1 | tee -a docs/explicitkeytests.txt
          echo ""
          echo "=== Flow Completeness Tests ===" | tee docs/flowtests.txt
          ./.lake/build/bin/flowtests 2>&1 | tee -a docs/flowtests.txt
          echo ""
          echo "=== Validation Tests ===" | tee docs/validationtests.txt
          ./.lake/build/bin/validationtests 2>&1 | tee -a docs/validationtests.txt
          echo ""
          echo "=== Dump Round-Trip Tests ===" | tee docs/dumproundtrip.txt
          ./.lake/build/bin/dumproundtrip 2>&1 | tee -a docs/dumproundtrip.txt
          echo ""
          echo "=== Raw Parse Tests ===" | tee docs/rawparsetests.txt
          ./.lake/build/bin/rawparsetests 2>&1 | tee -a docs/rawparsetests.txt
          echo ""
          echo "=== Spec Examples ===" | tee docs/specexamples.txt
          ./.lake/build/bin/specexamples 2>&1 | tee -a docs/specexamples.txt
          echo ""
          echo "=== Schema Dump Tests ===" | tee docs/schemadump.txt
          ./.lake/build/bin/schemadump 2>&1 | tee -a docs/schemadump.txt
          echo ""
          echo "=== Scanner Tests ===" | tee docs/scannertests.txt
          ./.lake/build/bin/scannertests 2>&1 | tee -a docs/scannertests.txt
          echo ""
          echo "=== Scanner Spec Examples ===" | tee docs/scannerspecexamples.txt
          ./.lake/build/bin/scannerspecexamples 2>&1 | tee -a docs/scannerspecexamples.txt
          echo ""
          echo "=== Adversarial Grammar Tests ===" | tee docs/adversarialtests.txt
          ./.lake/build/bin/adversarialtests 2>&1 | tee -a docs/adversarialtests.txt
          echo ""
          echo "=== Mutation Suite Tests ===" | tee docs/mutationtests.txt
          ./.lake/build/bin/mutationtests 2>&1 | tee -a docs/mutationtests.txt

      - name: Run diagnostic checks
        run: |
          echo "=== Flow Regression Check ===" | tee docs/flowregressioncheck.txt
          ./.lake/build/bin/flowregressioncheck 2>&1 | tee -a docs/flowregressioncheck.txt
          echo ""
          echo "=== Error Stage Diagnostics ===" | tee docs/errorstagediag.txt
          ./.lake/build/bin/errorstagediag 2>&1 | tee -a docs/errorstagediag.txt
          echo ""
          echo "=== Scalar Stage Diagnostics ===" | tee docs/scalarstagediag.txt
          ./.lake/build/bin/scalarstagediag 2>&1 | tee -a docs/scalarstagediag.txt

      - name: Generate HTML coverage reports
        run: |
          ./.lake/build/bin/suiterunner --html docs/ | tee docs/coverage-console.txt

      - name: Generate verified tests HTML page
        run: |
          cat docs/unit-tests.txt docs/demo.txt docs/explicitkeytests.txt docs/flowtests.txt docs/validationtests.txt docs/dumproundtrip.txt docs/rawparsetests.txt docs/specexamples.txt docs/schemadump.txt docs/scannertests.txt docs/scannerspecexamples.txt docs/adversarialtests.txt docs/mutationtests.txt > docs/all-verified-tests.txt

      - name: Upload coverage reports as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: docs/
          retention-days: 30

      - name: Commit coverage reports to main branch
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Update coverage reports: ${{ github.sha }}"
          git push

      - name: Comment on PR with coverage summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = fs.readFileSync('docs/coverage-console.txt', 'utf8');
            // Extract the "Correct: X/Y (Z%)" line
            const correctLine = coverage.match(/Correct: .*/)?.[0] || 'Statistics unavailable';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Test Coverage Report\n\n\`\`\`\n${correctLine}\n\`\`\`\n\nFull report: [Download artifact](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            });
