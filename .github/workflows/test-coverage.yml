name: Generate Test Coverage Report

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test-coverage:
    runs-on: self-hosted

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Elan (Lean toolchain manager)
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Install Lean toolchain
        run: |
          if [ -f lean-toolchain ]; then
            TOOLCHAIN="$(cat lean-toolchain)"
            echo "Lean toolchain: $TOOLCHAIN"
            elan toolchain install "$TOOLCHAIN" || true
          fi
          elan show

      - name: Build parser and test tools
        run: |
          lake build Lean4Yaml
          lake build suiterunner tryparse
          lake build tests parsetest quotedfolding verification demo
          lake build stringlemmas anchortests tagtests explicitkeytests flowtests

      - name: Run unit and integration tests
        run: |
          echo "=== Unit Tests ===" | tee docs/unit-tests.txt
          ./.lake/build/bin/tests 2>&1 | tee -a docs/unit-tests.txt
          echo ""
          echo "=== Parser Integration Tests ===" | tee docs/parsetest.txt
          ./.lake/build/bin/parsetest 2>&1 | tee -a docs/parsetest.txt
          echo ""
          echo "=== Quoted Folding Tests ===" | tee docs/quotedfolding.txt
          ./.lake/build/bin/quotedfolding 2>&1 | tee -a docs/quotedfolding.txt
          echo ""
          echo "=== Verification Tests ===" | tee docs/verification.txt
          ./.lake/build/bin/verification 2>&1 | tee -a docs/verification.txt
          echo ""
          echo "=== Demo ===" | tee docs/demo.txt
          ./.lake/build/bin/demo 2>&1 | tee -a docs/demo.txt
          echo ""
          echo "=== String Lemma Tests ===" | tee docs/stringlemmas.txt
          ./.lake/build/bin/stringlemmas 2>&1 | tee -a docs/stringlemmas.txt
          echo ""
          echo "=== Anchor/Alias Tests ===" | tee docs/anchortests.txt
          ./.lake/build/bin/anchortests 2>&1 | tee -a docs/anchortests.txt
          echo ""
          echo "=== Tag Tests ===" | tee docs/tagtests.txt
          ./.lake/build/bin/tagtests 2>&1 | tee -a docs/tagtests.txt
          echo ""
          echo "=== Explicit Key Tests ===" | tee docs/explicitkeytests.txt
          ./.lake/build/bin/explicitkeytests 2>&1 | tee -a docs/explicitkeytests.txt
          echo ""
          echo "=== Flow Completeness Tests ===" | tee docs/flowtests.txt
          ./.lake/build/bin/flowtests 2>&1 | tee -a docs/flowtests.txt

      - name: Create docs directory
        run: mkdir -p docs

      - name: Generate HTML coverage reports
        run: |
          ./.lake/build/bin/suiterunner --html docs/ | tee docs/coverage-console.txt

      - name: Generate verified tests HTML page
        run: |
          cat docs/unit-tests.txt docs/parsetest.txt docs/quotedfolding.txt docs/verification.txt docs/demo.txt docs/stringlemmas.txt docs/anchortests.txt docs/tagtests.txt docs/explicitkeytests.txt docs/flowtests.txt > docs/all-verified-tests.txt

      - name: Upload coverage reports as artifact
        uses: actions/upload-artifact@v3
        with:
          name: coverage-reports
          path: docs/
          retention-days: 30

      - name: Commit coverage reports to main branch
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Update coverage reports: ${{ github.sha }}"
          git push

      - name: Comment on PR with coverage summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = fs.readFileSync('docs/coverage-console.txt', 'utf8');
            // Extract the "Correct: X/Y (Z%)" line
            const correctLine = coverage.match(/Correct: .*/)?.[0] || 'Statistics unavailable';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Test Coverage Report\n\n\`\`\`\n${correctLine}\n\`\`\`\n\nFull report: [Download artifact](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            });
